<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flappy Quest — Fly, Collect, Customize</title>
    <meta name="description" content="A beautiful Flappy Bird clone with coins, power-ups, skins, achievements, and more.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== MENU ===== -->
<div id="menu-screen" class="screen active">
  <div class="menu-content">
    <div class="logo-container">
      <h1 class="game-logo">Flappy<span>Quest</span></h1>
      <p class="tagline">Fly • Collect • Customize</p>
    </div>
    <div class="menu-bird-preview"><canvas id="menu-bird-canvas" width="120" height="120"></canvas></div>
    <div class="difficulty-picker" id="diff-picker">
      <button class="diff-btn" data-diff="easy">Easy</button>
      <button class="diff-btn active" data-diff="normal">Normal</button>
      <button class="diff-btn" data-diff="hard">Hard</button>
    </div>
    <div class="menu-buttons">
      <button id="btn-play" class="btn btn-play" onclick="startGame()">▶ Play</button>
      <div class="btn-row">
        <button class="btn btn-shop" onclick="openShop()">🛍 Shop</button>
        <button class="btn btn-missions" onclick="openMissions()">🎯 Missions</button>
      </div>
      <button class="btn btn-secondary" onclick="openStats()">📊 Statistics</button>
    </div>
    <div class="menu-stats">
      <div class="stat-item"><span class="stat-icon">🪙</span><span class="stat-value" id="menu-coins">0</span></div>
      <div class="stat-item"><span class="stat-icon">🏆</span><span class="stat-value" id="menu-highscore">0</span></div>
    </div>
  </div>
</div>

<!-- ===== GAME ===== -->
<div id="game-screen" class="screen">
  <canvas id="game-canvas"></canvas>
  <div id="game-hud">
    <div id="hud-left">
      <div id="hud-score">0</div>
      <div id="hud-combo" class="hidden">🔥 <span id="combo-val">2</span>x</div>
    </div>
    <div id="hud-right">
      <div id="hud-coins"><span class="coin-icon">🪙</span><span id="hud-coin-count">0</span></div>
      <div id="hud-powerups"></div>
    </div>
  </div>
  <div id="fever-bar" class="hidden"><div id="fever-fill"></div><span>🔥 FEVER</span></div>
  <div id="near-miss-flash" class="hidden">NEAR MISS! +1🪙</div>
  <div id="tap-to-start" class="overlay-message">
    <div class="tap-content"><div class="tap-icon">👆</div><p>Tap to Flap!</p></div>
  </div>
</div>

<!-- ===== GAME OVER ===== -->
<div id="gameover-screen" class="screen">
  <div class="gameover-content">
    <h2 class="gameover-title">Game Over</h2>
    <div id="star-rating"><span>☆</span><span>☆</span><span>☆</span></div>
    <div class="gameover-stats">
      <div class="go-stat"><span class="go-label">Score</span><span class="go-value" id="go-score">0</span></div>
      <div class="go-stat"><span class="go-label">Best</span><span class="go-value" id="go-best">0</span></div>
      <div class="go-stat highlight"><span class="go-label">Coins</span><span class="go-value" id="go-coins">+0</span></div>
    </div>
    <div id="new-best" class="new-best hidden">✨ New Best! ✨</div>
    <div class="gameover-buttons">
      <button id="btn-revive" class="btn btn-revive" onclick="revive()">💖 Revive (50🪙)</button>
      <button class="btn btn-play" onclick="startGame()">🔄 Retry</button>
      <button class="btn btn-secondary" onclick="goToMenu()">🏠 Menu</button>
      <button class="btn btn-spin" onclick="openSpin()">🎰 Spin!</button>
    </div>
  </div>
</div>

<!-- ===== SHOP ===== -->
<div id="shop-screen" class="screen">
  <div class="shop-header">
    <button class="btn-icon" onclick="closeShop()">←</button>
    <div class="shop-tabs">
      <button class="shop-tab active" onclick="shopTab('skins')">Skins</button>
      <button class="shop-tab" onclick="shopTab('bgs')">Backgrounds</button>
    </div>
    <div class="shop-balance"><span class="coin-icon">🪙</span><span id="shop-coins">0</span></div>
  </div>
  <div class="shop-grid" id="shop-grid"></div>
</div>

<!-- ===== MISSIONS ===== -->
<div id="missions-screen" class="screen">
  <div class="panel-header">
    <button class="btn-icon" onclick="closeMissions()">←</button>
    <h2>🎯 Missions</h2><div></div>
  </div>
  <div class="missions-list" id="missions-list"></div>
</div>

<!-- ===== STATS ===== -->
<div id="stats-screen" class="screen">
  <div class="panel-header">
    <button class="btn-icon" onclick="closeStats()">←</button>
    <h2>📊 Statistics</h2><div></div>
  </div>
  <div class="stats-grid" id="stats-grid"></div>
  <div class="achievements-section">
    <h3>🏅 Achievements</h3>
    <div class="achievements-grid" id="ach-grid"></div>
  </div>
</div>

<!-- ===== SPIN WHEEL ===== -->
<div id="spin-screen" class="screen">
  <div class="spin-wrap">
    <h2>🎰 Lucky Spin</h2>
    <canvas id="spin-canvas" width="320" height="320"></canvas>
    <button id="btn-do-spin" class="btn btn-play" onclick="doSpin()">Spin!</button>
    <div id="spin-result" class="hidden"></div>
    <button id="btn-spin-close" class="btn btn-secondary hidden" onclick="closeSpin()">Collect</button>
  </div>
</div>

<!-- ===== DAILY BONUS ===== -->
<div id="daily-popup" class="popup hidden">
  <div class="popup-content">
    <h2>🎁 Daily Bonus!</h2>
    <p>Come back every day for free coins!</p>
    <div class="daily-reward">🪙 <span id="daily-amount">25</span></div>
    <button class="btn btn-play" onclick="claimDaily()">Claim!</button>
  </div>
</div>

<!-- ===== ACHIEVEMENT TOAST ===== -->
<div id="ach-toast" class="ach-toast hidden">
  <span class="ach-toast-icon">🏅</span>
  <div><div class="ach-toast-title" id="ach-toast-title">Achievement!</div><div class="ach-toast-desc" id="ach-toast-desc"></div></div>
</div>

<script src="data.js"></script>
<script src="ui.js"></script>
<script src="game.js"></script>
</body>
</html>
